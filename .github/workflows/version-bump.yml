name: Update Version

on:
  push:
    branches: [main]

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract commit info
        id: commit
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          # 嘗試讀取當前版本號，如果不存在則使用 v1.0.0
          CURRENT_VERSION=$(grep -oP 'id="appVersion">\K[^<]+' index.html 2>/dev/null || echo "v1.0.0")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in index.html
        env:
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
          COMMIT_COUNT: ${{ steps.commit.outputs.commit_count }}
          CURRENT_VERSION: ${{ steps.commit.outputs.current_version }}
        run: |
          # 解析當前版本號 (格式: v1.0.0)
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          # count 使用 commit 數量作為第三段
          COUNT=$COMMIT_COUNT
          NEW_VERSION="${MAJOR}.${MINOR}.${COUNT}-${SHORT_SHA}"
          echo "Updating version: $CURRENT_VERSION -> $NEW_VERSION"

          # 使用 sed 更新版本號
          sed -i "s|<span id=\"appVersion\">[^<]*</span>|<span id=\"appVersion\">$NEW_VERSION</span>|g" index.html

          # 顯示更新後的內容
          grep 'appVersion' index.html

      - name: Commit updated file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --cached --stat
          git commit -m "chore: bump version [skip ci]" || echo "No changes to commit"
          git push